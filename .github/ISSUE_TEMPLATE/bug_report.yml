name: Bug report
description: Create a report to help us improve.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us, what did you expect to happen?
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Please copy and paste any relevant log output (mask your PII!).
      render: shell
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Android
        - iOS
        - Web
        - Desktop (Windows/macOS/Linux)
    validations:
      required: true
  - type: input
    id: drift-version
    attributes:
      label: Drift Version
      placeholder: e.g. 2.14.0
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](CONTRIBUTING.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
